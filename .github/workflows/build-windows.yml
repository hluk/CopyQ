---
name: Windows

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]


concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  QT_VERSION: '6.10.2'
  KF_VERSION: '6.23'
  KF_PATCH: '0'
  KF_BRANCH: stable
  SNORETOAST_VERSION: '0.9.1'
  QCA_VERSION: '2.3.10'
  QTKEYCHAIN_VERSION: '0.15.0'
  COPYQ_TESTS_SKIP_DRAG_AND_DROP: '1'
  COPYQ_TESTS_SKIP_BASH: '1'
  COPYQ_TESTS_NO_SYMLINKS: '1'
  # There is no audio device on the CI system
  COPYQ_TESTS_SKIP_AUDIO: '1'

jobs:
  build:
    name: Windows
    runs-on: windows-2025
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
        with:
          submodules: false
          # Full commit history needed for sortable version string (git describe in CMake).
          # Blobless filter skips file content for historical commits to speed up clone.
          fetch-depth: 0
          filter: blob:none

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@d325aaf2a8baeeda41ad0b5d39f84a6af9bcf005 # v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2022_64
          modules: qtimageformats qt5compat
          cache: true
          set-env: true

      - name: Set OpenSSL path
        run: echo "OPENSSL_ROOT_DIR=C:/Program Files/OpenSSL" >> "$GITHUB_ENV"

      - name: Enable sccache
        uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2
        with:
          variant: sccache
          key: windows-msvc

      - name: Set up dependency paths
        run: |
          DEPS_PREFIX="${GITHUB_WORKSPACE}/deps/install"
          echo "DEPS_PREFIX=$DEPS_PREFIX" >> "$GITHUB_ENV"
          echo "$DEPS_PREFIX/bin" >> "$GITHUB_PATH"
          # Extend CMAKE_PREFIX_PATH with Qt and KDE deps.
          # install-qt-action sets QT_ROOT_DIR but may not set CMAKE_PREFIX_PATH.
          echo "CMAKE_PREFIX_PATH=${DEPS_PREFIX}/lib/cmake;${DEPS_PREFIX}/share/ECM/cmake;${QT_ROOT_DIR}/lib/cmake" >> "$GITHUB_ENV"

      - name: Cache KDE dependencies
        id: cache-deps
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ github.workspace }}/deps/install
          key: >-
            windows-deps
            -kf${{ env.KF_VERSION }}.${{ env.KF_PATCH }}
            -qca${{ env.QCA_VERSION }}
            -qtkeychain${{ env.QTKEYCHAIN_VERSION }}
            -snoretoast${{ env.SNORETOAST_VERSION }}
            -${{ hashFiles('utils/patches/**') }}

      - name: Build KDE dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: utils/github/build-windows-deps.sh

      - name: Download miniaudio
        uses: ./.github/actions/download-miniaudio

      - name: Build with CMake
        uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10
        env:
          VCPKG_ROOT: ''
        with:
          configurePreset: Windows
          buildPreset: Windows
          configurePresetAdditionalArgs: >-
            [
            '-DWITH_NATIVE_NOTIFICATIONS=TRUE',
            '-DWITH_QCA_ENCRYPTION=TRUE',
            '-DWITH_KEYCHAIN=TRUE'
            ]


      - name: Get version string
        id: version
        uses: ./.github/actions/get-version
        with:
          build_dir: ${{ runner.workspace }}/build/copyq/Windows

      - name: Compute numeric version for installer
        id: version_numeric
        shell: bash
        run: |
          # VersionInfoVersion requires numeric-only (x.x.x or x.x.x.x).
          numeric="${{ steps.version.outputs.version }}"
          numeric="${numeric%-g*}"
          echo "value=$numeric" >> "$GITHUB_OUTPUT"

      - name: Deploy application
        run: utils/github/deploy-windows.sh
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          BUILD_DIR: ${{ runner.workspace }}/build/copyq/Windows

      - name: Test console wrapper (cmd)
        working-directory: ${{ github.workspace }}/copyq-${{ steps.version.outputs.version }}
        shell: cmd
        run: |
          @echo off

          rem --- Test 1: stdout capture via redirect ---
          copyq.com version > __out.txt 2>nul
          if %ERRORLEVEL% neq 0 (echo FAIL: exit code %ERRORLEVEL% & exit /b 1)
          findstr /C:"CopyQ" __out.txt >nul || (echo FAIL: no CopyQ in output & type __out.txt & exit /b 1)
          del __out.txt

          rem --- Test 2: piping works ---
          copyq.com version 2>nul | findstr /C:"CopyQ" >nul
          if %ERRORLEVEL% neq 0 (echo FAIL: pipe did not contain CopyQ & exit /b 1)

          rem --- Test 3: exit code propagation for errors ---
          copyq.com thisCommandDoesNotExist12345 >nul 2>nul
          if %ERRORLEVEL% equ 0 (echo FAIL: expected non-zero exit code & exit /b 1)

          rem --- Test 4: terminal still functional after wrapper exits ---
          echo AFTER_WRAPPER | findstr /C:"AFTER_WRAPPER" >nul
          if %ERRORLEVEL% neq 0 (echo FAIL: terminal corrupted & exit /b 1)

          echo All cmd console wrapper tests passed.

      - name: Test console wrapper (pwsh)
        working-directory: ${{ github.workspace }}/copyq-${{ steps.version.outputs.version }}
        shell: pwsh
        run: |
          # GitHub Actions prepends $ErrorActionPreference = 'Stop' to pwsh
          # scripts.  Native commands that emit stderr (Qt debug/warnings)
          # generate ErrorRecords that terminate the script before 2>$null
          # can suppress them.  Override to Continue and check manually.
          $ErrorActionPreference = 'Continue'
          $PSNativeCommandUseErrorActionPreference = $false

          # Test 1: stdout capture
          $version = (& .\copyq.com version) -join "`n"
          if ($LASTEXITCODE -ne 0) { throw "FAIL Test 1: exit code $LASTEXITCODE" }
          if (-not $version) { throw 'FAIL Test 1: copyq.com version produced no output' }
          if ($version -notmatch 'CopyQ') { throw "FAIL Test 1: no CopyQ in: $version" }

          # Test 2: piping
          $piped = & .\copyq.com version | Select-String 'CopyQ'
          if (-not $piped) { throw 'FAIL Test 2: piped output missing CopyQ' }

          # Test 3: exit code propagation
          & .\copyq.com thisCommandDoesNotExist12345 | Out-Null
          if ($LASTEXITCODE -eq 0) { throw 'FAIL Test 3: expected non-zero exit code' }

          # Test 4: terminal still works
          $check = 'AFTER_WRAPPER'
          if ($check -ne 'AFTER_WRAPPER') { throw 'FAIL Test 4: terminal corrupted' }

          Write-Host 'All pwsh console wrapper tests passed.'
          exit 0

      - name: Set up GPG for tests
        shell: pwsh
        run: |
          $env:PATH = "C:\Program Files\Git\usr\bin;$env:PATH"
          New-Item -ItemType Directory -Force "$HOME\.gnupg" | Out-Null
          gpg --version

      - name: Test
        working-directory: ${{ github.workspace }}/copyq-${{ steps.version.outputs.version }}
        shell: cmd
        run: |
          set "PATH=%CD%;C:\Program Files\Git\usr\bin"
          .\copyq-tests.exe
        env:
          QT_FORCE_STDERR_LOGGING: 1
          COPYQ_LOG_LEVEL: DEBUG
          COPYQ_TESTS_RERUN_FAILED: 1
          COPYQ_PLUGINS: ${{ github.workspace }}\copyq-${{ steps.version.outputs.version }}\itemtests.dll

      - name: Separate test files from portable app
        run: |
          APP="copyq-${{ steps.version.outputs.version }}"
          mkdir -p "${APP}-tests"
          mv "${APP}/copyq-tests.exe" "${APP}-tests/"
          mv "${APP}/itemtests.dll" "${APP}-tests/"
          mv "${APP}/Qt6Test.dll" "${APP}-tests/"

      - name: Build installer
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" /O"%GITHUB_WORKSPACE%" ^
            /DAppVersion="${{ steps.version.outputs.version }}" ^
            /DAppVersionNumeric="${{ steps.version_numeric.outputs.value }}" ^
            /DRoot="%GITHUB_WORKSPACE%\copyq-${{ steps.version.outputs.version }}" ^
            /DSource="%GITHUB_WORKSPACE%" ^
            "%GITHUB_WORKSPACE%\shared\copyq.iss"

      - name: Create portable zip
        run: 7z a "copyq-${{ steps.version.outputs.version }}.zip" "copyq-${{ steps.version.outputs.version }}"

      - name: Upload portable zip
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: copyq-${{ steps.version.outputs.version }}.zip
          path: copyq-${{ steps.version.outputs.version }}.zip
          archive: false

      - name: Upload installer
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: copyq-${{ steps.version.outputs.version }}-setup.exe
          path: copyq-${{ steps.version.outputs.version }}-setup.exe
          archive: false

      - name: Upload tests
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: copyq-${{ steps.version.outputs.version }}-tests.zip
          path: copyq-${{ steps.version.outputs.version }}-tests
          archive: true


  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b3bb33fedc5a65e1c1f24ac66a1ced9384 # v8.0.1

      - name: Upload to release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          draft: true
          files: |
            copyq-*/*.zip
            copyq-*/*.exe
