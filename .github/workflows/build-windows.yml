---
name: Windows

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  QT_VERSION: '6.8.3'
  KF_VERSION: '6.15'
  KF_PATCH: '0'
  KF_BRANCH: stable
  SNORETOAST_VERSION: '0.9.0'
  QCA_VERSION: '2.3.10'
  QTKEYCHAIN_VERSION: '0.15.0'
  COPYQ_TESTS_SKIP_DRAG_AND_DROP: '1'
  COPYQ_TESTS_NO_SYMLINKS: '1'

jobs:
  build:
    name: Windows
    runs-on: windows-2025
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: false
          # Full history needed for git describe (version string).
          fetch-depth: 0

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2022_64
          modules: qt5compat
          cache: true
          set-env: true

      - name: Install OpenSSL
        shell: pwsh
        run: |
          choco install openssl --no-progress -y
          # Chocolatey installs OpenSSL to 'C:\Program Files\OpenSSL' (not OpenSSL-Win64).
          $sslDir = if (Test-Path 'C:\Program Files\OpenSSL-Win64') { 'C:\Program Files\OpenSSL-Win64' } else { 'C:\Program Files\OpenSSL' }
          echo "OPENSSL_ROOT_DIR=$sslDir" >> $env:GITHUB_ENV

      - name: Enable sccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          variant: sccache
          key: windows-msvc

      - name: Set up dependency paths
        run: |
          DEPS_PREFIX="${GITHUB_WORKSPACE}/deps/install"
          echo "DEPS_PREFIX=$DEPS_PREFIX" >> "$GITHUB_ENV"
          echo "$DEPS_PREFIX/bin" >> "$GITHUB_PATH"
          # Extend CMAKE_PREFIX_PATH with Qt and KDE deps.
          # install-qt-action sets QT_ROOT_DIR but may not set CMAKE_PREFIX_PATH.
          echo "CMAKE_PREFIX_PATH=${DEPS_PREFIX}/lib/cmake;${DEPS_PREFIX}/share/ECM/cmake;${QT_ROOT_DIR}/lib/cmake" >> "$GITHUB_ENV"

      - name: Cache KDE dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/deps/install
          key: >-
            windows-deps
            -kf${{ env.KF_VERSION }}.${{ env.KF_PATCH }}
            -qca${{ env.QCA_VERSION }}
            -qtkeychain${{ env.QTKEYCHAIN_VERSION }}
            -snoretoast${{ env.SNORETOAST_VERSION }}
            -${{ hashFiles('utils/patches/**') }}

      - name: Build KDE dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: utils/github/build-windows-deps.sh

      - name: Build with CMake
        uses: lukka/run-cmake@v10
        env:
          VCPKG_ROOT: ''
        with:
          configurePreset: Windows
          buildPreset: Windows
          configurePresetAdditionalArgs: >-
            [
            '-DWITH_NATIVE_NOTIFICATIONS=TRUE',
            '-DWITH_QCA_ENCRYPTION=TRUE',
            '-DWITH_KEYCHAIN=TRUE'
            ]

      - name: Create gnupg directory for tests
        run: mkdir -p ~/.gnupg && chmod go-rwx ~/.gnupg

      - name: Test
        working-directory: ${{ runner.workspace }}/build/copyq/Windows
        run: '"$GITHUB_WORKSPACE"/utils/github/test-windows.sh'
        env:
          COPYQ_PLUGINS: ${{ runner.workspace }}/build/copyq/Windows/src/itemtests.dll
          GPGPATH: C:/Program Files/Git/usr/bin

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            ${{ runner.workspace }}/build/copyq/Windows/**/*.log*
          if-no-files-found: ignore
