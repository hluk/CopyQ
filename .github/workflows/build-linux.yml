---
name: Linux

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  common_packages: >-
    ninja-build

    libxfixes-dev
    libxtst-dev

    extra-cmake-modules
    libwayland-dev

    libegl-dev

    gnupg2

    xvfb
    openbox
    xdotool
  qt6_packages: >-
    qt6-base-private-dev
    qt6-base-dev
    qt6-base-dev-tools
    qt6-tools-dev
    qt6-tools-dev-tools
    qt6-l10n-tools
    qt6-declarative-dev

    libqt6svg6-dev
    libqt6svg6

    libkf6guiaddons-dev
    libkf6guiaddons

    libqt6waylandclient6
    qt6-wayland
    qt6-wayland-dev
    qt6-wayland-dev-tools

    libqca-qt6-dev
    libqca-qt6-2
    libqca-qt6-plugins

    qtkeychain-qt6-dev

  QCA_VERSION: '2.3.10'
  QTKEYCHAIN_VERSION: '0.15.0'

  # FIXME: Sending signal to client process does not cause the process
  # to exit with non-zero code with GitHub Actions. Why?
  COPYQ_TESTS_SKIP_SIGNAL: '1'

jobs:
  build:
    name: ${{matrix.buildname}}
    runs-on: ${{matrix.os}}
    strategy:
      # Avoid canceling all jobs on transient failures.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            buildname: Qt 6
            compiler: g++
            compiler_package: g++
            custom_qt: '6.10.2'
            with_native_notifications: false
            test_wayland: true
            test_gnome: true
            coverage: true
            cmake_preset: Debug
            compiler_flags: >-
              --coverage
              -fprofile-arcs
              -ftest-coverage
              -fprofile-abs-path
              -fprofile-update=atomic
            test_x11: true

          - os: ubuntu-latest
            buildname: Qt 6 Clang
            compiler: clang++
            compiler_package: clang
            with_native_notifications: false
            cmake_preset: Debug
            test_x11: true

          - os: ubuntu-latest
            buildname: AppImage
            compiler: g++
            compiler_package: g++
            with_native_notifications: true
            cmake_preset: Release
            appimage: true
            test_x11: false
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
        with:
          submodules: false
          fetch-depth: 1
          persist-credentials: false

      - name: Enable ccache
        uses: hendrikmuhs/ccache-action@33522472633dbd32578e909b315f5ee43ba878ce # v1.2.22
        with:
          key: ${{ github.job }}-${{ matrix.os }}

      - name: Set up ccache
        run: |
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"

      - name: Set up KDE Neon repo for KF6 packages
        if: matrix.appimage
        run: |
          wget -qO - https://archive.neon.kde.org/public.key |
            sudo gpg --dearmor -o /usr/share/keyrings/neon-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/neon-archive-keyring.gpg] https://archive.neon.kde.org/stable noble main" |
            sudo tee /etc/apt/sources.list.d/neon.list
          sudo apt-get update

      - name: Install dependencies (AppImage)
        if: matrix.appimage
        run: >-
          sudo apt-get install -y
          ninja-build libxfixes-dev libxtst-dev extra-cmake-modules libwayland-dev libegl-dev gnupg2 xvfb openbox xdotool
          qt6-base-private-dev qt6-base-dev qt6-base-dev-tools qt6-tools-dev qt6-tools-dev-tools qt6-l10n-tools qt6-declarative-dev
          libqt6svg6-dev libqt6svg6
          libkf6guiaddons-dev
          libqt6waylandclient6 qt6-wayland qt6-wayland-dev qt6-wayland-dev-tools
          libqca-qt6-dev libqca-qt6-2 libqca-qt6-plugins
          qtkeychain-qt6-dev
          libkf6notifications-dev kf6-kstatusnotifieritem-dev

      - name: Install dependencies
        if: '!matrix.appimage'
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1
        with:
          version: 1.0
          packages: >-
            ${{ matrix.compiler_package }}
            ${{ env.common_packages }}
            ${{ !matrix.custom_qt && env.qt6_packages || '' }}
            ${{ matrix.coverage && 'lcov' || '' }}
            ${{ matrix.test_wayland && 'kwin-wayland kwin-wayland-backend-virtual libwayland-server0' || '' }}
            ${{ matrix.custom_qt && 'libssl-dev libsecret-1-dev pkg-config' || '' }}
            ${{ matrix.coverage && 'procps' || '' }}
            ${{ matrix.test_gnome && 'gnome-shell gnome-shell-common glib2.0-bin' || '' }}

      - name: Install Qt
        if: matrix.custom_qt
        uses: jurplel/install-qt-action@d325aaf2a8baeeda41ad0b5d39f84a6af9bcf005 # v4
        with:
          version: ${{ matrix.custom_qt }}
          modules: qt5compat

      - name: Build QCA and QtKeychain
        if: matrix.custom_qt
        run: |
          set -e
          git clone --depth 1 --branch v${{ env.QCA_VERSION }} https://github.com/KDE/qca.git /tmp/qca
          cmake -G Ninja -S /tmp/qca -B /tmp/qca-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DBUILD_WITH_QT6=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_TOOLS=OFF \
            -DBUILD_PLUGINS=ossl
          cmake --build /tmp/qca-build --parallel
          sudo cmake --install /tmp/qca-build

          git clone --depth 1 --branch ${{ env.QTKEYCHAIN_VERSION }} https://github.com/frankosterfeld/qtkeychain.git /tmp/qtkeychain
          cmake -G Ninja -S /tmp/qtkeychain -B /tmp/qtkeychain-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DBUILD_WITH_QT6=ON \
            -DBUILD_TRANSLATIONS=OFF
          cmake --build /tmp/qtkeychain-build --parallel
          sudo cmake --install /tmp/qtkeychain-build

          echo "LD_LIBRARY_PATH=/usr/local/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Download miniaudio
        uses: ./.github/actions/download-miniaudio

      - name: Build with CMake
        uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10
        with:
          configurePreset: '${{ matrix.cmake_preset }}'
          buildPreset: '${{ matrix.cmake_preset }}'
          configurePresetAdditionalArgs: >-
            [
            '-DCMAKE_CXX_COMPILER=${{matrix.compiler}}',
            '-DCMAKE_CXX_FLAGS=${{matrix.compiler_flags}}',
            '-DCMAKE_C_FLAGS=${{matrix.compiler_flags}}',
            '-DWITH_NATIVE_NOTIFICATIONS=${{matrix.with_native_notifications}}',
            ]

      - name: Create gnupg directory for tests
        run: mkdir -p ~/.gnupg && chmod go-rwx ~/.gnupg

      - name: Test on GNOME
        working-directory: >-
          ${{github.workspace}}/build/copyq/${{ matrix.cmake_preset }}
        if: matrix.test_gnome
        run: '${{github.workspace}}/utils/github/test-linux-gnome-extension.sh'
        env:
          COPYQ_TESTS_EXECUTABLE: >-
            ${{github.workspace}}/_install/copyq/${{ matrix.cmake_preset }}/bin/copyq

      - name: Test on Wayland
        working-directory: >-
          ${{github.workspace}}/build/copyq/${{ matrix.cmake_preset }}
        if: matrix.test_wayland
        run: '${{github.workspace}}/utils/github/test-linux-wayland.sh'
        env:
          COPYQ_TESTS_EXECUTABLE: >-
            ${{github.workspace}}/_install/copyq/${{ matrix.cmake_preset }}/bin/copyq

      - name: Test on X11
        working-directory: >-
          ${{github.workspace}}/build/copyq/${{ matrix.cmake_preset }}
        if: matrix.test_x11 != false
        run: '${{github.workspace}}/utils/github/test-linux.sh'
        env:
          COPYQ_TESTS_EXECUTABLE: >-
            ${{github.workspace}}/_install/copyq/${{ matrix.cmake_preset }}/bin/copyq

      - name: Set up AppImage tools
        if: matrix.appimage
        run: |
          mkdir -p "$HOME/.local/bin"
          wget -q -O "$HOME/.local/bin/linuxdeploy" https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O "$HOME/.local/bin/linuxdeploy-plugin-qt" https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          wget -q -O "$HOME/.local/bin/linuxdeploy-plugin-appimage" https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          chmod +x "$HOME/.local/bin"/linuxdeploy*
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Get version string
        if: matrix.appimage
        id: version
        uses: ./.github/actions/get-version
        with:
          build_dir: ${{ github.workspace }}/build/copyq/${{ matrix.cmake_preset }}

      - name: Create AppImage
        if: matrix.appimage
        env:
          DESTDIR: ${{github.workspace}}/AppDir
          EXTRA_QT_MODULES: svg
          EXTRA_QT_PLUGINS: tls
          EXTRA_PLATFORM_PLUGINS: libqwayland.so
          QMAKE: qmake6
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          DESTDIR="$DESTDIR" cmake --install build/copyq/${{ matrix.cmake_preset }}
          linuxdeploy --appdir "$DESTDIR" \
            --desktop-file "$DESTDIR/usr/share/applications/com.github.hluk.copyq.desktop" \
            --icon-file "$DESTDIR/usr/share/icons/hicolor/scalable/apps/copyq.svg" \
            --executable "$DESTDIR/usr/bin/copyq" \
            --plugin qt \
            --output appimage

      - name: Upload AppImage
        if: matrix.appimage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: CopyQ-${{ steps.version.outputs.version }}-x86_64.AppImage
          path: CopyQ-*.AppImage

      - name: Update coverage
        if: matrix.coverage
        working-directory: >-
          ${{github.workspace}}/build/copyq/${{ matrix.cmake_preset }}
        run: |
          lcov --capture --directory . \
            --base-directory '${{github.workspace}}' \
            --no-external \
            --rc branch_coverage=1 \
            --rc geninfo_no_exception_branch=1 \
            --output-file coverage-full.info
          # Remove 3rd party files in source tree
          lcov --remove coverage-full.info \
              '*/plugins/itemfakevim/fakevim/*' \
              '*/src/gui/fix_icon_id.h' \
              --output-file coverage.info

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5
        with:
          files: ${{github.workspace}}/build/copyq/${{ matrix.cmake_preset }}/coverage.info
          fail_ci_if_error: true
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}


  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

      - name: Upload to release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          draft: true
          files: 'CopyQ-*/*.AppImage'
